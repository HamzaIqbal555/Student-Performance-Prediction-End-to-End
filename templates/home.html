<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Performance Predictor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/custom.css') }}" rel="stylesheet">
</head>

<body>
    <div class="form-compact">
        <div class="card">
            <div class="card-header">
                <h1><i class="bi bi-graph-up"></i> Math Score Predictor</h1>
                <p>Professional ML tool for student performance analysis</p>
            </div>
            <div class="card-body">
                <form action="{{ url_for('predict_datapoint') }}" method="post" id="predictForm">
                    <div class="row-compact">
                        <div class="col-compact col-6">
                            <label class="form-label">Gender</label>
                            <select class="form-select form-select-sm" name="gender" required>
                                <option value="" disabled selected>Select</option>
                                <option value="male">Male</option>
                                <option value="female">Female</option>
                            </select>
                        </div>
                        <div class="col-compact col-6">
                            <label class="form-label">Ethnicity</label>
                            <select class="form-select form-select-sm" name="ethnicity" required>
                                <option value="" disabled selected>Select</option>
                                <option value="group A">A</option>
                                <option value="group B">B</option>
                                <option value="group C">C</option>
                                <option value="group D">D</option>
                                <option value="group E">E</option>
                            </select>
                        </div>
                    </div>
                    <div class="row-compact">
                        <div class="col-compact col-6">
                            <label class="form-label">Parent Education</label>
                            <select class="form-select form-select-sm" name="parental_level_of_education" required>
                                <option value="" disabled selected>Select</option>
                                <option value="associate's degree">Associate</option>
                                <option value="bachelor's degree">Bachelor</option>
                                <option value="high school">HS</option>
                                <option value="master's degree">Master</option>
                                <option value="some college">College</option>
                                <option value="some high school">Some HS</option>
                            </select>
                        </div>
                        <div class="col-compact col-6">
                            <label class="form-label">Lunch</label>
                            <select class="form-select form-select-sm" name="lunch" required>
                                <option value="" disabled selected>Select</option>
                                <option value="free/reduced">Free</option>
                                <option value="standard">Standard</option>
                            </select>
                        </div>
                    </div>
                    <div class="row-compact">
                        <div class="col-compact col-6">
                            <label class="form-label">Test Prep</label>
                            <select class="form-select form-select-sm" name="test_preparation_course" required>
                                <option value="" disabled selected>Select</option>
                                <option value="none">None</option>
                                <option value="completed">Yes</option>
                            </select>
                        </div>
                        <div class="col-compact col-6">
                            <label class="form-label">Reading</label>
                            <input class="form-control form-control-sm" type="number" name="writing_score" min="0"
                                max="100" placeholder="0-100" required>
                        </div>
                    </div>
                    <div class="row-compact">
                        <div class="col-compact col-6">
                            <label class="form-label">Writing</label>
                            <input class="form-control form-control-sm" type="number" name="reading_score" min="0"
                                max="100" placeholder="0-100" required>
                        </div>
                        <div class="col-compact col-6"></div>
                    </div>
                    <div class="btn-group w-100 mt-2" role="group">
                        <button class="btn btn-primary flex-fill" type="submit">Predict Score</button>
                        <button class="btn btn-outline-secondary flex-fill" type="button" id="resetBtn">
                            <i class="bi bi-arrow-clockwise"></i> Reset
                        </button>
                    </div>
                </form>
                <div id="result" style="display: none;">
                    <h3>Predicted Math Score</h3>
                    <div class="score" id="scoreValue">0 / 100</div>
                </div>
            </div>
            <div class="card-footer">
                <p>CatBoost ML Model • End-to-End Project</p>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>

</html>
