steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/student-performance-prediction-end-to-end', '.']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/student-performance-prediction-end-to-end']
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    args:
      - gcloud
      - run
      - deploy
      - student-performance-prediction-end-to-end
      - --image=gcr.io/$PROJECT_ID/student-performance-prediction-end-to-end
      - --region=europe-west1
      - --platform=managed

options:
  logging: CLOUD_LOGGING_ONLY